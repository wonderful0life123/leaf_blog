name: Deploy to wonder-ai.info

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SERVER_HOST: wonder-ai.info
  SERVER_PORT: "22"
  SERVER_USER: deploy
  SERVER_PATH: /var/www/firefly

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Configure SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "${SERVER_SSH_KEY}" ]; then
            echo "Missing GitHub secret: SERVER_SSH_KEY"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/wonder-ai-deploy
          chmod 600 ~/.ssh/wonder-ai-deploy
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Publish static files
        run: |
          rsync -az --delete \
            -e "ssh -p ${SERVER_PORT} -i ~/.ssh/wonder-ai-deploy -o IdentitiesOnly=yes" \
            dist/ "${SERVER_USER}@${SERVER_HOST}:${SERVER_PATH}/"
